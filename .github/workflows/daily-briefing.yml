name: Daily Briefing

# Scheduling moved to Vercel Cron (see vercel.json) for reliability.
# This workflow is kept for manual triggering only (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily briefing
        run: |
          curl -X POST "${{ secrets.APP_BASE_URL }}/api/automation/daily-briefing" \
            -H "Authorization: Bearer ${{ secrets.DAILY_BRIEFING_SECRET }}" \
            -H "Content-Type: application/json" \
            -f
